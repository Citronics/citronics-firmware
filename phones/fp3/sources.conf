#!/bin/bash
# FP3-specific firmware copy operations

FP3_FIRMWARE_COMMIT="ee529820bb874ab1b52873f0b144c3786f01ee4c"
FP3_FIRMWARE_URL="https://github.com/FairBlobs/FP3-firmware/archive/${FP3_FIRMWARE_COMMIT}.tar.gz"
SNS_REG_SRC="$(dirname "${BASH_SOURCE[0]}")/sns.reg"

copy_firmware() {
  local FIRMWARE_DIR="$1"
  local WORK_DIR
  WORK_DIR=$(mktemp -d)
  
  echo "Downloading FP3 firmware (commit ${FP3_FIRMWARE_COMMIT})..."
  curl -fL "${FP3_FIRMWARE_URL}" | tar xz -C "${WORK_DIR}" --strip-components=1
  local SRC="${WORK_DIR}"
  
  mkdir -p "${FIRMWARE_DIR}/qcom/msm8953/fairphone/fp3"
  mkdir -p "${FIRMWARE_DIR}/wlan/prima"
  mkdir -p "${FIRMWARE_DIR}/qcom"
  mkdir -p "${FIRMWARE_DIR}/modem_pr"
  
  # Modem (MPSS + MBA)
  install -m 0644 "${SRC}/mba.mbn" "${FIRMWARE_DIR}/mba.mbn"
  for f in "${SRC}"/modem.mdt "${SRC}"/modem.b*; do
    [ -f "$f" ] && install -m 0644 "$f" "${FIRMWARE_DIR}/$(basename "$f")"
  done
  # ADSP
  for f in "${SRC}"/adsp.mdt "${SRC}"/adsp.b*; do
    [ -f "$f" ] && install -m 0644 "$f" "${FIRMWARE_DIR}/$(basename "$f")"
  done
  # WCNSS
  for f in "${SRC}"/wcnss.mdt "${SRC}"/wcnss.b*; do
    [ -f "$f" ] && install -m 0644 "$f" "${FIRMWARE_DIR}/$(basename "$f")"
  done
  # Venus
  for f in "${SRC}"/venus.mdt "${SRC}"/venus.b*; do
    [ -f "$f" ] && install -m 0644 "$f" "${FIRMWARE_DIR}/$(basename "$f")"
  done
  # GPU a530 (Adreno 506 PM4/PFP)
  install -m 0644 "${SRC}/a530_pfp.fw" "${FIRMWARE_DIR}/qcom/a530_pfp.fw"
  install -m 0644 "${SRC}/a530_pm4.fw" "${FIRMWARE_DIR}/qcom/a530_pm4.fw"
  # GPU a506 zap shader
  for f in "${SRC}"/a506_zap.mdt "${SRC}"/a506_zap.b* "${SRC}"/a506_zap.elf; do
    [ -f "$f" ] && install -m 0644 "$f" "${FIRMWARE_DIR}/qcom/msm8953/fairphone/fp3/$(basename "$f")"
  done
  # WiFi NV data
  install -m 0644 "${SRC}/wlan/prima/WCNSS_qcom_wlan_nv.bin" "${FIRMWARE_DIR}/wlan/prima/WCNSS_qcom_wlan_nv.bin"
  install -m 0644 "${SRC}/wlan/prima/WCNSS_qcom_cfg.ini" "${FIRMWARE_DIR}/wlan/prima/WCNSS_qcom_cfg.ini"
  # Modem config
  cp -a "${SRC}/modem_pr/." "${FIRMWARE_DIR}/modem_pr/"
  # Speaker amp firmware
  install -m 0644 "${SRC}/tas2557_uCDSP.bin" "${FIRMWARE_DIR}/tas2557_uCDSP.bin"
  install -m 0644 "${SRC}/aw8898_cfg.bin" "${FIRMWARE_DIR}/aw8898_cfg.bin"
  # Sensor registry
  mkdir -p "${FIRMWARE_DIR}/qcom/sensors"
  install -m 0644 "${SNS_REG_SRC}" "${FIRMWARE_DIR}/qcom/sensors/sns.reg"
  
  # DTS firmware-name symlinks under qcom/msm8953/fairphone/fp3/
  local FP3_DIR="${FIRMWARE_DIR}/qcom/msm8953/fairphone/fp3"
  # ADSP symlinks
  for f in "${FIRMWARE_DIR}"/adsp.mdt "${FIRMWARE_DIR}"/adsp.b*; do
    [ -f "$f" ] && ln -sf "../../../../$(basename "$f")" "${FP3_DIR}/$(basename "$f")"
  done
  # MBA symlink
  ln -sf "../../../../mba.mbn" "${FP3_DIR}/mba.mbn"
  # WCNSS symlinks
  for f in "${FIRMWARE_DIR}"/wcnss.mdt "${FIRMWARE_DIR}"/wcnss.b*; do
    [ -f "$f" ] && ln -sf "../../../../$(basename "$f")" "${FP3_DIR}/$(basename "$f")"
  done
  # WCNSS NV bin symlink
  ln -sf "../../../../wlan/prima/WCNSS_qcom_wlan_nv.bin" "${FP3_DIR}/WCNSS_qcom_wlan_nv.bin"
  # Modem symlinks
  for f in "${FIRMWARE_DIR}"/modem.mdt "${FIRMWARE_DIR}"/modem.b*; do
    [ -f "$f" ] && ln -sf "../../../../$(basename "$f")" "${FP3_DIR}/$(basename "$f")"
  done
  # .mbn aliases
  ln -sf adsp.mdt "${FP3_DIR}/adsp.mbn"
  ln -sf wcnss.mdt "${FP3_DIR}/wcnss.mbn"
  ln -sf modem.mdt "${FP3_DIR}/modem.mbn"
  ln -sf a506_zap.mdt "${FP3_DIR}/a506_zap.mbn"
  
  rm -rf "${WORK_DIR}"
}
