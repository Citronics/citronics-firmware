#!/bin/bash
# FP2-specific firmware copy operations

copy_firmware() {
  local FIRMWARE_DIR="$1"
  mkdir -p "${FIRMWARE_DIR}/wlan/prima"
  cp android_device_fairphone_FP2/wifi/WCNSS* "${FIRMWARE_DIR}/wlan/prima/"
  cp fp2-firmware/* "${FIRMWARE_DIR}/"

  # Sensors registry for the in-kernel SMGR/sns_reg drivers (6.18+ kernels).
  # Without it the ADSP sensor manager exposes no sensors.
  mkdir -p "${FIRMWARE_DIR}/qcom/sensors"
  cp phones/fp2/sns.reg "${FIRMWARE_DIR}/qcom/sensors/sns.reg"
}
